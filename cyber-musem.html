<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Musem - WangZheng</title>
    <link rel="stylesheet" href="assets/css/site.css">
</head>

<body data-page="cyber-musem">
    <div id="top"></div>
    <main class="main-content" id="mainContent">
        <div class="container">
            <header class="reveal page-hero" id="cyber-home">
                <div class="header-layout">
                    <div class="header-left">
                        <div class="header-name">
                            <h1 data-zh="电子博物馆" data-en="Cyber Musem">电子博物馆</h1>
                        </div>
                    </div>
                    <div class="subtitle-group">
                        <p class="subtitle" data-zh="重要照片与文字记录" data-en="A collection of important photos and records">重要照片与文字记录</p>
                        <p class="subtitle" data-zh="属于自己的数字展厅" data-en="A personal digital exhibition space">属于自己的数字展厅</p>
                    </div>
                </div>
            </header>

            <section class="card reveal" id="museum-intro">
                <h2 data-zh="馆藏导言" data-en="FOREWARD">馆藏导言</h2>
                <p data-zh="这里保存那些我认为值得长期留存的画面与文字。它们像展品一样被重新陈列，也像记忆一样持续发光。"
                    data-en="This page keeps the photos and notes I want to preserve for a long time. They are arranged like exhibits and kept alive like memories.">
                    这里保存那些我认为值得长期留存的画面与文字。它们像展品一样被重新陈列，也像记忆一样持续发光。
                </p>
            </section>

            <section class="card reveal" id="museum-gallery">
                <div class="museum-stack">
                    <article class="museum-exhibit">
                        <div class="museum-frame">
                            <img src="./old_version/img/cprogramming.jpg" alt="C Programming exhibit">
                        </div>
                        <div class="museum-copy">
                            <h3 data-zh="C Programming" data-en="C Programming">C Programming</h3>
                            <div class="museum-datetime" data-zh="2020年秋" data-en="2020 Autumn">2020年秋</div>
                            <p data-zh="这件展品记录了一段和编程启蒙有关的记忆。"
                                data-en="This exhibit records a memory related to programming beginnings. ">
                                这件展品记录了一段和编程启蒙有关的记忆。
                            </p>
                        </div>
                    </article>
                </div>
            </section>

            <section class="card reveal" id="museum-notes">
                <h2 data-zh="结语" data-en="CONCLUSION">结语</h2>
                <div class="museum-note">
                    <p data-zh="继续前进。"
                        data-en="keep moving forward.">
                        继续前进。
                    </p>
                </div>
            </section>

            <footer class="reveal">
                <p>&copy; 2026 <span data-zh="Wang Zheng" data-en="WANG Zheng">Wang Zheng</span>. <span data-zh="保留所有权利"
                        data-en="All rights reserved">保留所有权利</span>.</p>
            </footer>
        </div>
    </main>

    <script src="assets/js/site-shell.js"></script>
</body>

</html>
