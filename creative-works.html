<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Works - WangZheng</title>
    <link rel="stylesheet" href="assets/css/site.css">
</head>

<body data-page="creative-works">
    <div id="top"></div>
    <main class="main-content" id="mainContent">
        <div class="container">
            <header class="reveal page-hero" id="creative-home">
                <div class="header-layout">
                    <div class="header-left">
                        <div class="header-name">
                            <h1 data-zh="创意作品" data-en="Creative Works">创意作品</h1>
                        </div>
                    </div>
                    <div class="subtitle-group">
                        <p class="subtitle" data-zh="创意产品" data-en="My creative products">创意产品</p>
                        <p class="subtitle" data-zh="持续更新中" data-en="Updated continuously">持续更新中</p>
                    </div>
                </div>
            </header>

            <section class="card reveal" id="creative-intro">
                <h2 data-zh="页面简介" data-en="Overview">页面简介</h2>
                <p data-zh="兴趣激发、需求挖掘、产品定义与实现。"
                    data-en="Inspire, discover, define, and implement creative products.">
                    兴趣激发、需求挖掘、产品定义与实现。
                </p>
            </section>

            <section class="card reveal" id="works-gallery">
                <h2 data-zh="作品列表" data-en="Works">作品列表</h2>
                <div class="works-grid">
                    <article class="work-card">
                        <h3 data-zh="EncByByte" data-en="EncByByte">EncByByte</h3>
                        <p data-zh="按字节的编码解码器。"
                            data-en="Encoder and decoder by byte.">
                            按字节的编码解码器。
                        </p>
                        <!-- <p class="work-meta" data-zh="分类：摄影" data-en="Category: Photography">分类：摄影</p> -->
                    </article>
                    <article class="work-card">
                        <h3 data-zh="Border Watermark" data-en="Border Watermark">Border Watermark</h3>
                        <p data-zh="边框水印。"
                            data-en="Border watermark">
                            边框水印。
                        </p>
                        <!-- <p class="work-meta" data-zh="分类：风景影像" data-en="Category: Landscape">分类：风景影像</p> -->
                    </article>
                    <article class="work-card">
                        <h3 data-zh="ChordKeyboard" data-en="ChordKeyboard">ChordKeyboard</h3>
                        <p data-zh="基于首调唱名法的和弦演奏器。"
                            data-en="ChordKeyboard">
                            基于首调唱名法的和弦演奏器。
                        </p>
                    </article>
                    <article class="work-card">
                        <h3 data-zh="更多" data-en="More">更多</h3>
                        <p data-zh="持续更新中。"
                            data-en="Continuously updating...">
                            持续更新中。
                        </p>
                    </article>
                </div>
            </section>

            <section class="card reveal" id="creative-plan">
                <h2 data-zh="后续计划" data-en="Next Updates">后续计划</h2>
                <p data-zh="跳转链接"
                    data-en="Jump to the work detail page.">
                    跳转链接
                </p>
            </section>

            <footer class="reveal">
                <p>&copy; 2026 <span data-zh="Wang Zheng" data-en="WANG Zheng">Wang Zheng</span>. <span data-zh="保留所有权利"
                        data-en="All rights reserved">保留所有权利</span>.</p>
            </footer>
        </div>
    </main>

    <script src="assets/js/site-shell.js"></script>
</body>

</html>
